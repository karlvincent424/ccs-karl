<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="variables.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="Register.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <title>CCS Sit-in Monitoring System - Register</title>
  </head>
  <body>
    <div class="nav">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor" style="color: var(--primary); flex-shrink: 0;">
          <path d="M12 2c0 5.523-4.477 10-10 10 5.523 0 10 4.477 10 10 0-5.523 4.477-10 10-10-5.523 0-10-4.477-10-10z" />
        </svg>
        <p class="title">CCS Sit-in</p>
      </div>

      <div class="links">
        <a href="index.html">Home</a>
        <a href="#community">Community</a>
        <a href="#about">About</a>
        <a href="Login.html">Login</a>
        <a href="Register.html" class="active">Register</a>
      </div>
      
      <button class="mobile-menu-toggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <main>
      <section class="Register animate__animated animate__fadeInUp">
        <div class="container-left">
          <h1 style="margin-top: 0; line-height: 1.2;">Create Your Account</h1>
          <form action="">
            <div class="input-text">
              <label for="number">ID Number</label>
              <input type="text" id="number" placeholder=" " />
            </div>

            <div class="input-text">
              <label for="lastname">Last Name</label>
              <input type="text" id="lastname" placeholder=" " />
            </div>

            <div class="input-text">
              <label for="firstname">First Name</label>
              <input type="text" id="firstname" placeholder=" " />
            </div>

            <div class="input-text-group">
              <div class="input-text">
                <label for="middlename">Middle Name</label>
                <input type="text" id="middlename" placeholder=" " />
              </div>
              <div class="checkbox-container">
                <input type="checkbox" id="noMiddleNameCheckbox" />
                <label for="noMiddleNameCheckbox">No Middle Name</label>
              </div>
            </div>
            <div class="input-text">
                <label for="course">Select Course</label>
                <select id="course" required>
                  <option value="" disabled selected>Select Course</option>
                </select>
            </div>
            <div class="input-text">
                <label for="courselevel">Select Course Level</label>
                <select id="courselevel" required>
                  <option value="" disabled selected>Select Course Level</option>
                </select>
            </div>
          </form>
        </div>

          <div class="container-right">
            <h1 style="margin-top: 0; line-height: 1.2; visibility: hidden; pointer-events: none; user-select: none;">Create Your Account</h1>
            <form action="">
            <div class="input-text">
              <label for="address">Address</label>
              <input type="text" id="address" placeholder=" " />
            </div>

            <div class="input-text">
              <label for="email">Email</label>
              <input type="text" id="email" placeholder=" " />
            </div>

            <div class="input-text-group">
              <div class="input-text">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder=" " />
              </div>
              <div id="passwordFeedback" class="feedback-msg"></div>
            </div>

            <div class="input-text-group">
              <div class="input-text">
                <label for="confirmPassword">Repeat Password</label>
                <input type="password" id="confirmPassword" placeholder=" " />
              </div>
              <div id="confirmPasswordFeedback" class="feedback-msg"></div>
            </div>

            <div class="btn">
              <button type="button">Register</button>
            </div>
            
            <div class="login-link">
              <p>Already have an account? <a href="Login.html">Login here</a></p>
            </div>
          </form>
        </div>
      </section>
    </main>
    <script src="register.js"></script>
  </body>
</html>
